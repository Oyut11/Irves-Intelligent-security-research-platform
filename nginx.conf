# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  IRVES — Nginx Reverse Proxy Configuration with SSL/TLS                         ║
# ║  Usage:                                                                         ║
# ║    1. Copy to /etc/nginx/sites-available/irves                                  ║
# ║    2. ln -s /etc/nginx/sites-available/irves /etc/nginx/sites-enabled/          ║
# ║    3. Replace 'yourdomain.com' with your actual domain                          ║
# ║    4. Test: nginx -t                                                            ║
# ║    5. Reload: systemctl reload nginx                                            ║
# ║    6. Get SSL: certbot --nginx -d yourdomain.com                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=irves_limit:10m rate=30r/s;

upstream irves_backend {
    server 127.0.0.1:8765;
    keepalive 64;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name yourdomain.com;  # Replace with your domain

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name yourdomain.com;  # Replace with your domain

    # SSL certificates (use Let's Encrypt via certbot)
    # After running: certbot --nginx -d yourdomain.com
    # These lines will be auto-updated by certbot
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;

    # Client body size limit (for large APK uploads)
    client_max_body_size 500M;
    client_body_timeout 300s;

    # WebSocket support (for network proxy)
    location /api/network/ws {
        proxy_pass http://irves_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Main application proxy
    location / {
        proxy_pass http://irves_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=irves_limit burst=50 nodelay;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files (optional - if serving from nginx instead of app)
    location /static/ {
        alias /opt/irves/backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (for monitoring)
    location /api/health {
        proxy_pass http://irves_backend;
        access_log off;
    }
}
