{% extends "base.html" %}
{% block title %}{{ title }} — IRVES{% endblock %}

{% block head %}
<style>
.docs-page {
    max-width: 900px;
    margin: 0 auto;
    padding: var(--sp-8) var(--sp-6);
}

.docs-header {
    margin-bottom: var(--sp-8);
    padding-bottom: var(--sp-5);
    border-bottom: 1px solid var(--border);
}

.docs-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: var(--sp-2);
}

.docs-breadcrumb {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: var(--sp-4);
}

.docs-content {
    line-height: 1.7;
    color: var(--text-primary);
}

.docs-content h1 {
    font-size: 24px;
    font-weight: 700;
    margin-top: var(--sp-8);
    margin-bottom: var(--sp-4);
    padding-bottom: var(--sp-3);
    border-bottom: 1px solid var(--border-light);
}

.docs-content h2 {
    font-size: 20px;
    font-weight: 600;
    margin-top: var(--sp-6);
    margin-bottom: var(--sp-3);
}

.docs-content h3 {
    font-size: 16px;
    font-weight: 600;
    margin-top: var(--sp-5);
    margin-bottom: var(--sp-2);
}

.docs-content p {
    margin-bottom: var(--sp-4);
}

.docs-content ul,
.docs-content ol {
    margin-bottom: var(--sp-4);
    padding-left: var(--sp-5);
}

.docs-content li {
    margin-bottom: var(--sp-2);
}

.docs-content code {
    background: var(--surface-raised);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
}

.docs-content pre {
    background: var(--surface-raised);
    padding: var(--sp-4);
    border-radius: var(--radius);
    overflow-x: auto;
    margin-bottom: var(--sp-4);
    border: 1px solid var(--border-light);
}

.docs-content pre code {
    background: none;
    padding: 0;
    color: var(--text-primary);
}

.docs-content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: var(--sp-4);
    font-size: 13px;
}

.docs-content th,
.docs-content td {
    padding: 10px 12px;
    border: 1px solid var(--border-light);
    text-align: left;
}

.docs-content th {
    background: var(--surface-raised);
    font-weight: 600;
    color: var(--text-muted);
}

.docs-content a {
    color: var(--accent);
    text-decoration: none;
}

.docs-content a:hover {
    text-decoration: underline;
}

.docs-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: var(--sp-4);
    margin-bottom: var(--sp-4);
    color: var(--text-muted);
    font-style: italic;
}

.docs-content hr {
    border: none;
    border-top: 1px solid var(--border-light);
    margin: var(--sp-6) 0;
}

.docs-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    margin-bottom: var(--sp-5);
    transition: all 0.2s;
}

.docs-back-btn:hover {
    background: var(--surface-raised);
    color: var(--text-primary);
    border-color: var(--accent);
}
</style>
{% endblock %}

{% block content %}
<div class="docs-page">
    <button class="docs-back-btn" onclick="history.back()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
    </button>

    <div class="docs-header">
        <div class="docs-breadcrumb">IRVES / {{ breadcrumb }}</div>
        <h1 class="docs-title">{{ title }}</h1>
    </div>

    <div class="docs-content">
        {{ content | safe }}
    </div>
</div>
{% endblock %}
